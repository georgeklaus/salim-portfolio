databases:
  - name: salim-portfolio-db
    plan: free
    databaseName: salim_portfolio
    user: salim_portfolio

services:
  - type: web
    name: salim-portfolio
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m gunicorn backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: salim-portfolio-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: EMAIL_TIMEOUT
        value: "5"
